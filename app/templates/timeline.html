{% extends "base.html" %}

{% block title %}Timeline{% endblock %}

{% block content %}
<h1>Timeline</h1>

<form id="form">
	<input name="name" placeholder="Name" required>
	<input name="email" type="email" placeholder="Email" required>
	<textarea name="content" placeholder="Say something..." required></textarea>
	<button type="submit">Post</button>
</form>

<div id="posts"></div>

<script>
const posts = document.getElementById('posts');

function show(p) {
	const el = document.createElement('div');
	el.innerHTML = `<strong>${p.name}</strong>: ${p.content} <small>(${p.created_at})</small>`;
	posts.appendChild(el);
}

fetch('/api/timeline_post')
	.then(r => r.json())
	.then(d => d.timeline_posts.forEach(show));

document.getElementById('form').addEventListener('submit', async e => {
	e.preventDefault();
	const res = await fetch('/api/timeline_post', { method: 'POST', body: new FormData(e.target) });
	const p = await res.json();
	const el = document.createElement('div');
	el.innerHTML = `<strong>${p.name}</strong>: ${p.content} <small>(${p.created_at})</small>`;
	posts.prepend(el);
	e.target.reset();
});
</script>
{% endblock %}
